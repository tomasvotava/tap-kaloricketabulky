send_anonymous_usage_stats: true
project_id: "tap-kaloricketabulky"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-kaloricketabulky"
    namespace: "tap_kaloricketabulky"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    # TODO: Declare settings and their types here:
    settings:
    - name: auth_token
      label: Auth Token
      description: The token to authenticate against Kaloricketabulky
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Initial date to start extracting data from

    # TODO: Declare required settings here:
    settings_group_validation:
    - [auth_token]

    # TODO: Declare default configuration values here:
    config:
      start_date: 6 months ago

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
