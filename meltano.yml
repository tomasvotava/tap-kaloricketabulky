send_anonymous_usage_stats: true
project_id: "tap-kaloricketabulky"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-kaloricketabulky"
    namespace: "tap_kaloricketabulky"
    pip_url: -e .
    executable: tap-kaloricketabulky
    capabilities:
    - catalog
    - state
    - discover
    - about
    - stream-maps
    - schema-flattening

    settings:
    - name: email
      kind: string
      sensitive: true
      label: Email
      description: Login email address for kaloricketabulky.cz.

    - name: password
      kind: string
      sensitive: true
      label: Password
      description: Login password for kaloricketabulky.cz.

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Earliest date to sync; records before this date are ignored.

    - name: end_date
      kind: date_iso8601
      label: End Date
      description: Latest date to sync (inclusive). Defaults to today when omitted.

    - name: lookback_days
      kind: integer
      label: Lookback Days
      description: Number of days before the last bookmark to re-sync on incremental runs.
      value: 3

    - name: request_delay_seconds
      kind: decimal
      label: Request Delay (seconds)
      description: Seconds to wait between API requests to avoid hammering the server.
      value: 0.5

    - name: base_url
      kind: string
      label: Base URL
      description: Override the kaloricketabulky.cz base URL (e.g. for testing).

    - name: user_agent
      kind: string
      label: User Agent
      description: Custom User-Agent header sent with every request.

    settings_group_validation:
    - [email, password, start_date]

    config:
      start_date: '2024-01-01T00:00:00Z'
      lookback_days: 3

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
