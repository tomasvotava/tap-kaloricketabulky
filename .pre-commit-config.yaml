repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run --no-sync ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff
        name: ruff
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run --no-sync mypy tap_kaloricketabulky tests
        language: system
        types: [python]
        pass_filenames: false
      - id: commitizen
        name: commitizen
        entry: uv run --no-sync cz check --commit-msg-file
        language: system
        stages: [commit-msg]
